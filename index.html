<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gorilla Physics VR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
    
    <script>
      AFRAME.registerComponent('hand-physics', {
        init: function () {
          // Detect when the hand model touches a solid object
          this.el.addEventListener('collidestart', (e) => {
            const rig = document.querySelector('#rig');
            const hand = this.el.object3D;
            
            // Get the direction the camera is facing to push you forward
            const camera = document.querySelector('#camera').object3D;
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);

            if (rig.body) {
                // STOP THE SPIN: Force angular velocity to zero on impact
                rig.body.angularVelocity.set(0, 0, 0);
                
                // PUSH: Fling in the opposite direction of the camera's gaze
                // 8 = forward force, 5 = upward jump force
                rig.body.velocity.set(-dir.x * 8, 5, -dir.z * 8);
            }
          });
        }
      });
    </script>
</head>
<body style="margin: 0; background: #87CEEB;">

    <a-scene physics="gravity: -9.8; debug: false">
        
        <a-entity light="type: ambient; intensity: 0.9"></a-entity>
        <a-entity light="type: directional; intensity: 0.5" position="1 10 1"></a-entity>

        <a-entity id="rig" position="0 2 0" 
                  dynamic-body="mass: 1; shape: sphere; sphereRadius: 0.5; fixedRotation: true">
            
            <a-camera id="camera" wasd-controls="enabled: false" look-controls></a-camera>

            <a-entity oculus-touch-controls="hand: left" 
                      static-body="shape: sphere; sphereRadius: 0.2" 
                      hand-physics></a-entity>

            <a-entity oculus-touch-controls="hand: right" 
                      static-body="shape: sphere; sphereRadius: 0.2" 
                      hand-physics></a-entity>
        </a-entity>

        <a-plane static-body rotation="-90 0 0" width="500" height="500" color="#228B22"></a-plane>

        <a-box static-body position="-5 2 -10" color="orange"></a-box>
        <a-box static-body position="5 2 -10" color="red"></a-box>

        <a-sky color="#87CEEB"></a-sky>

    </a-scene>
</body>
</html>
