<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Gorilla WebVR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
    
    <script>
      AFRAME.registerComponent('gorilla-hand', {
        init: function () {
          // Listen for the trigger/click
          this.el.addEventListener('click', (evt) => {
            const rig = document.querySelector('#rig');
            const camera = document.querySelector('#camera');
            
            // 1. Get the direction the camera is facing
            const direction = new THREE.Vector3();
            camera.object3D.getWorldDirection(direction);
            
            // 2. The "Fling": Reverse the direction and multiply by force
            // Adjust '7' for speed and '5' for jump height
            const speed = 7;
            const jump = 5;

            // 3. Apply velocity to the physics body
            if (rig.body) {
                // Reset rotation to stop the spinning glitch
                rig.body.angularVelocity.set(0, 0, 0); 
                
                // Set the launch speed
                rig.body.velocity.set(
                    -direction.x * speed, 
                    jump, 
                    -direction.z * speed
                );
            }
          });
        }
      });
    </script>
  </head>
  <body style="margin: 0; background-color: #87CEEB;">

    <a-scene physics="gravity: -9.8; debug: false">
      
      <a-entity light="type: ambient; intensity: 0.8"></a-entity>
      <a-entity light="type: directional; intensity: 0.5" position="1 10 1"></a-entity>

      <a-entity id="rig" position="0 1 0" dynamic-body="mass: 1; shape: sphere; sphereRadius: 0.5; fixedRotation: true">
        <a-camera id="camera" wasd-controls="enabled: false">
          <a-cursor color="red" raycaster="objects: .surface" gorilla-hand></a-cursor>
        </a-camera>
        
        <a-entity oculus-touch-controls="hand: left"></a-entity>
        <a-entity oculus-touch-controls="hand: right"></a-entity>
      </a-entity>

      <a-plane class="surface" static-body rotation="-90 0 0" width="100" height="100" color="#228B22"></a-plane>

      <a-box class="surface" static-body position="-5 2.5 -10" width="2" height="5" color="#444"></a-box>
      <a-box class="surface" static-body position="5 3 -15" width="2" height="6" color="#444"></a-box>
      <a-box class="surface" static-body position="0 5 -25" width="4" height="10" color="#444"></a-box>

      <a-sky color="#87CEEB"></a-sky>

    </a-scene>
  </body>
</html>
