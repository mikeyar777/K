<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blank Development Room</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene physics="gravity: -9.8; debug: false">
        
        <a-entity light="type: ambient; intensity: 0.8"></a-entity>
        <a-entity light="type: directional; intensity: 0.5" position="1 10 1"></a-entity>

        <a-entity id="rig" position="0 1.6 0">
            <a-camera id="camera" look-controls></a-camera>
            <a-entity oculus-touch-controls="hand: left"></a-entity>
            <a-entity oculus-touch-controls="hand: right"></a-entity>
        </a-entity>

        <a-plane static-body rotation="-90 0 0" width="10" height="10" color="#555"></a-plane>
        
        <a-plane static-body rotation="90 0 0" position="0 5 0" width="10" height="10" color="#333"></a-plane>
        
        <a-box static-body position="0 2.5 -5" width="10" height="5" depth="0.1" color="#444"></a-box>
        
        <a-box static-body position="0 2.5 5" width="10" height="5" depth="0.1" color="#444"></a-box>
        
        <a-box static-body position="-5 2.5 0" rotation="0 90 0" width="10" height="5" depth="0.1" color="#444"></a-box>
        
        <a-box static-body position="5 2.5 0" rotation="0 -90 0" width="10" height="5" depth="0.1" color="#444"></a-box>

        <a-sky color="#000"></a-sky>

    </a-scene>

</body>
</html>
