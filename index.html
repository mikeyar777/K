<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Gorilla Gravity Fix</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
    
    <script>
      AFRAME.registerComponent('gorilla-move', {
        init: function () {
          this.el.addEventListener('click', (evt) => {
            const rig = document.querySelector('#rig');
            const camera = document.querySelector('#camera');
            const dir = new THREE.Vector3();
            camera.object3D.getWorldDirection(dir);
            
            // Fling yourself!
            if (rig.body) {
                rig.body.angularVelocity.set(0, 0, 0); 
                rig.body.velocity.set(-dir.x * 8, 6, -dir.z * 8);
            }
          });
        }
      });
    </script>
  </head>
  <body style="margin: 0; background-color: #87CEEB;">

    <a-scene physics="gravity: -9.8; debug: false">
      
      <a-entity light="type: ambient; intensity: 0.8"></a-entity>
      <a-entity light="type: directional; intensity: 0.5" position="1 10 1"></a-entity>

      <a-entity id="rig" position="0 5 0" dynamic-body="mass: 1; shape: sphere; sphereRadius: 0.5; fixedRotation: true">
        <a-camera id="camera" wasd-controls="enabled: false">
          <a-cursor color="red" raycaster="objects: .surface" gorilla-move></a-cursor>
        </a-camera>
        <a-entity oculus-touch-controls="hand: left"></a-entity>
        <a-entity oculus-touch-controls="hand: right"></a-entity>
      </a-entity>

      <a-plane class="surface" static-body 
               rotation="-90 0 0" width="1000" height="1000" color="#228B22"></a-plane>

      <a-sky color="#87CEEB"></a-sky>

      <a-box class="surface" static-body position="0 2.5 -10" width="2" height="10" color="#444"></a-box>

    </a-scene>
  </body>
</html>
